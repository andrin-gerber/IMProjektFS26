<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AbenteuerNOW</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.digital.sbb.ch/fonts/v1/sbb-neue.css"
    />
  </head>
  <body>
    <header>
      <div class="name">
        <h1 id="abenteuer">Abenteuer</h1>
        <h1 id="now">NOW</h1>
      </div>
      <div class="logo">
        <img src="img/logo.svg" />
      </div>
    </header>
    <main>
      <div class="box">
        <div class="box-title">
          <h2>Lust auf ein Abenteuer?</h2>
          <h1>NOW!</h1>
        </div>
        <div class="box-text">
          <p>Du hast die Nase voll immer die gleichen Orte zu besuchen?</p>
          <p>Lust auf etwas Neues?</p>
        </div>
      </div>
      <div class="box">
        <input id="ort-input" placeholder="Von" autocomplete="off" />
        <div id="vorschlaege"></div>
        <input
          id="zeit-input"
          placeholder="Wie viel Zeit hast du?"
          autocomplete="off"
        />
        <button id="start-btn">Reise suchen</button>
      </div>
    </main>
    <footer></footer>
    <script src="js/script.js" type="module"></script>
  </body>
</html>
